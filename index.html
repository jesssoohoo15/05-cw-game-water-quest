<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Water Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Libre+Baskerville&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <h1>Water Quest</h1>
    <p class="game-instructions">Collect 20 items to complete the game! Avoid the dirty water — it costs you points.</p>
    <div class="stats">
      <p>Cans Collected: <span id="current-cans">0</span></p>
      <p>Time Left: <span id="timer">30</span>s</p>
    </div>
    <div id="achievements" class="achievement"></div>
    <div class="game-grid"></div>
    <div class="controls">
      <button id="start-game">Start Game</button>
      <button id="reset-game">Reset</button>
    </div>
    <footer class="site-footer">
      <p class="footer-mission">Inspired by charity: water — a nonprofit bringing clean and safe drinking water to people in developing countries.</p>
      <nav class="footer-links" aria-label="charity: water links">
        <a href="https://www.charitywater.org/" target="_blank" rel="noopener">charitywater.org</a>
        <a class="donate" href="https://www.charitywater.org/donate" target="_blank" rel="noopener">Donate</a>
      </nav>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
